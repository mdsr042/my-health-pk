name: Desktop Release (Manual)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag to release (for example: v1.0.3)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: true
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop distribution
        run: npm run desktop:dist

      - name: Ensure tag exists in repository
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "${{ inputs.version_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.version_tag }}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${{ inputs.version_tag }}"
            git push origin "${{ inputs.version_tag }}"
          fi

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp -R dist/* release-assets/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
